services:
  db:
    image: postgres:17
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - .env

  pgadmin:
    image: dpage/pgadmin4
    container_name: miau-pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PG_ADMIN_DB_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PG_ADMIN_DB_PASSWORD}
    ports:
      - "${PG_ADMIN_PORT}:80"
    depends_on:
      - db
    env_file:
      - .env
 
  miau-container:
    build: .
    container_name: miau-backend
    ports:
      - "8765:8765"
    depends_on:
      - db
    env_file:
      - .env

  mailpit:
    image: axllent/mailpit:latest
    container_name: mailpit
    restart: unless-stopped
    ports:
      - "${MAILPIT_PORT}:8025"
      - "${SMTP_PORT}:1025"
    environment:
      - MP_MAX_MESSAGES=5000

volumes:
  postgres_data:
